<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Shockify Hyperlink</title><style>body{margin:0;background:radial-gradient(circle at top,#1b1600,#090909 60%);color:#fff;font-family:Arial,sans-serif;overflow:hidden}.spark{position:fixed;width:4px;height:4px;border-radius:50%;background:#ffd54a;box-shadow:0 0 12px #ffd54a;animation:float 8s linear infinite}@keyframes float{from{transform:translateY(110vh)}to{transform:translateY(-10vh)}}.card{width:440px;margin:8vh auto;background:rgba(20,20,20,.82);border:1px solid #ffcf40;border-radius:22px;box-shadow:0 0 30px rgba(255,208,64,.35);padding:32px}.logo{text-align:center;font-size:58px}.logo{filter:drop-shadow(0 0 12px gold)}h1{text-align:center;color:#ffd54a}p{text-align:center;color:#ccc}input{width:100%;padding:14px;margin:10px 0;border-radius:12px;border:1px solid #444;background:#111;color:#fff}button{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(90deg,#ffcf40,#ffea87);color:#111;font-weight:bold}</style></head><body><script>for(let i=0;i<40;i++){let s=document.createElement("div");s.className="spark";s.style.left=Math.random()*100+"vw";s.style.animationDuration=(5+Math.random()*6)+"s";s.style.animationDelay=(-Math.random()*8)+"s";document.body.appendChild(s);}</script><div class="card"><div class="logo">⚡</div><h1>SHOCKIFY HYPERLINK</h1><p>Paste your URL below.</p><input placeholder="https://example.com"><input placeholder="Custom Alias (optional)"><button>Hide Link</button></div></body></html>
