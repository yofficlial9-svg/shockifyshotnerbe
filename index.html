<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Shockify Hyperlink</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

html,body{

width:100%;
height:100%;

overflow:hidden;

background:#070707;

color:white;

}

body{

display:flex;

justify-content:center;

align-items:center;

position:relative;

}

/* Background */

body::before{

content:"";

position:absolute;

width:200%;

height:200%;

background:

radial-gradient(circle at 20% 20%,rgba(255,215,0,.08),transparent 25%),

radial-gradient(circle at 80% 70%,rgba(255,180,0,.08),transparent 20%),

linear-gradient(#0d0d0d,#050505);

animation:bgmove 18s linear infinite;

}

@keyframes bgmove{

0%{

transform:translate(-5%,-5%) rotate(0deg);

}

100%{

transform:translate(-8%,-8%) rotate(360deg);

}

}

/* Sparks */

.spark{

position:absolute;

width:4px;

height:4px;

border-radius:50%;

background:#FFD84F;

box-shadow:

0 0 8px #FFD84F,

0 0 20px #FFD84F,

0 0 35px #FFD84F;

animation:float linear infinite;

opacity:.8;

}

@keyframes float{

from{

transform:translateY(110vh);

}

to{

transform:translateY(-10vh);

}

}

/* Lightning flashes */

.flash{

position:absolute;

width:2px;

height:200px;

background:white;

filter:blur(1px);

opacity:0;

animation:lightning 8s infinite;

}

@keyframes lightning{

0%,96%,100%{

opacity:0;

}

97%{

opacity:1;

box-shadow:

0 0 25px white,

0 0 60px gold;

}

98%{

opacity:.15;

}

99%{

opacity:1;

}

}

/* Main Card */

.card{

position:relative;

z-index:5;

width:520px;

padding:40px;

border-radius:22px;

background:

linear-gradient(

180deg,

rgba(30,30,30,.96),

rgba(12,12,12,.96)

);

border:1px solid rgba(255,208,55,.25);

backdrop-filter:blur(20px);

box-shadow:

0 0 30px rgba(255,205,0,.25),

0 0 90px rgba(255,205,0,.08);

}

/* Logo */

.logo{

font-size:72px;

text-align:center;

margin-bottom:10px;

filter:

drop-shadow(0 0 20px gold)

drop-shadow(0 0 50px gold);

animation:pulse 2.2s infinite;

}

@keyframes pulse{

50%{

transform:scale(1.06);

filter:

drop-shadow(0 0 28px gold)

drop-shadow(0 0 65px gold);

}

}

.title{

font-size:38px;

font-weight:800;

letter-spacing:2px;

text-align:center;

background:

linear-gradient(90deg,#FFE76A,#FFC400);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

margin-bottom:8px;

}

.subtitle{

text-align:center;

color:#AAAAAA;

margin-bottom:30px;

font-size:15px;

}

/* Inputs */

.input{

width:100%;

padding:16px;

background:#111;

border:1px solid #303030;

border-radius:14px;

color:white;

font-size:15px;

outline:none;

margin-bottom:16px;

transition:.2s;

}

.input:focus{

border-color:#FFD84F;

box-shadow:

0 0 10px rgba(255,216,79,.5);

}
.button{

width:100%;

padding:16px;

border:none;

border-radius:14px;

cursor:pointer;

font-size:16px;

font-weight:700;

background:linear-gradient(90deg,#FFD84F,#FFC400);

color:#111;

box-shadow:

0 0 20px rgba(255,215,0,.45);

transition:.25s;

margin-bottom:18px;

}

.button:hover{

transform:translateY(-2px);

box-shadow:

0 0 30px rgba(255,215,0,.75);

}

.result{

display:none;

margin-top:20px;

}

.result textarea{

width:100%;

height:120px;

padding:15px;

resize:none;

background:#111;

color:white;

border:1px solid #333;

border-radius:14px;

font-size:14px;

outline:none;

}

.copy{

margin-top:12px;

background:linear-gradient(90deg,#FFE97A,#FFD84F);

}

.copy:hover{

box-shadow:0 0 35px gold;

}

.select{

width:100%;

padding:16px;

background:#111;

border:1px solid #333;

border-radius:14px;

color:white;

margin-bottom:15px;

font-size:15px;

}

.footer{

margin-top:25px;

text-align:center;

color:#777;

font-size:13px;

}

</style>

</head>

<body>

<script>

for(let i=0;i<80;i++){

const s=document.createElement("div");

s.className="spark";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDuration=(5+Math.random()*7)+"s";

s.style.animationDelay=(-Math.random()*7)+"s";

document.body.appendChild(s);

}

for(let i=0;i<5;i++){

const l=document.createElement("div");

l.className="flash";

l.style.left=Math.random()*100+"vw";

l.style.top="-100px";

l.style.transform="rotate("+(Math.random()*30-15)+"deg)";

l.style.animationDelay=(Math.random()*8)+"s";

document.body.appendChild(l);

}

</script>

<div class="card">

<div class="logo">⚡</div>

<div class="title">

SHOCKIFY HYPERLINK

</div>

<div class="subtitle">

Hide long links with style.

</div>

<input

id="url"

class="input"

placeholder="Paste your link...">

<select

id="type"

class="select">

<option value="auto">Auto Detect</option>

<option value="profile">Roblox Profile</option>

<option value="game">Roblox Game</option>

<option value="group">Roblox Group</option>

<option value="discord">Discord Invite</option>

<option value="youtube">YouTube Video</option>

<option value="website">Website</option>

</select>

<button

class="button"

onclick="shorten()">

⚡ Hide Link

</button>

<div

class="result"

id="result">

<textarea

id="markdown"

readonly></textarea>

<button

class="button copy"

onclick="copyMarkdown()">

Copy Markdown

</button>

</div>

<div class="footer">

Powered by Shockify

</div>

</div>

<script>

function detectType(url){

if(url.includes("roblox.com/users/")) return "profile";

if(url.includes("roblox.com/games/")) return "game";

if(url.includes("roblox.com/groups/")) return "group";

if(url.includes("discord.gg/")) return "discord";

if(url.includes("youtube.com/watch")||url.includes("youtu.be/")) return "youtube";

return "website";

}
async function shorten() {
    const url = document.getElementById("url").value.trim();

    if (!url) {
        alert("Enter a URL.");
        return;
    }

    let type = document.getElementById("type").value;
    if (type === "auto") {
        type = detectType(url);
    }

    const btn = document.querySelector(".button");
    btn.disabled = true;
    btn.innerHTML = "⚡ Hiding...";

    try {
        const response = await fetch("/short", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ url })
        });

        const data = await response.json();

        btn.disabled = false;
        btn.innerHTML = "⚡ Hide Link";

        if (data.error) {
            alert(data.error);
            return;
        }

        let title = "🔗 Link";

        switch (type) {
            case "profile":
                title = "👤 Roblox Profile";
                break;
            case "game":
                title = "🎮 Roblox Game";
                break;
            case "group":
                title = "👥 Roblox Group";
                break;
            case "discord":
                title = "💬 Discord Invite";
                break;
            case "youtube":
                title = "📺 YouTube Video";
                break;
            default:
                title = "🌐 Website";
        }

        const markdown = `> ### ${title}

[Shockify](${data.shorturl})`;

        document.getElementById("markdown").value = markdown;
        document.getElementById("result").style.display = "block";

    } catch (err) {
        console.error(err);
        alert(err.message || "Failed to shorten link.");
    }
}

function copyMarkdown() {

    const box = document.getElementById("markdown");

    box.select();
    box.setSelectionRange(0, 99999);

    navigator.clipboard.writeText(box.value);

    const btn = document.querySelector(".copy");

    btn.innerHTML = "✅ Copied!";

    setTimeout(() => {

        btn.innerHTML = "Copy Markdown";

    }, 1500);

}

</script>

</body>
</html>
